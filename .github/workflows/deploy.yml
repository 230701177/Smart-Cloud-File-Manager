name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: 'Terraform Plan/Apply'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform

    - name: Terraform Plan
      run: terraform plan
      working-directory: ./terraform

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve
      working-directory: ./terraform

  build-and-push-docker:
    name: 'Build and Push Docker Image'
    needs: terraform
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name acrsmartcloudfmprod

    - name: Build and Push Image
      run: |
        docker build -t acrsmartcloudfmprod.azurecr.io/smartcloud:${{ github.sha }} .
        docker tag acrsmartcloudfmprod.azurecr.io/smartcloud:${{ github.sha }} acrsmartcloudfmprod.azurecr.io/smartcloud:latest
        docker push acrsmartcloudfmprod.azurecr.io/smartcloud:${{ github.sha }}
        docker push acrsmartcloudfmprod.azurecr.io/smartcloud:latest

  deploy-to-aks:
    name: 'Deploy to AKS'
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set AKS Context
      uses: azure/aks-set-context@v4
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        resource-group: 'rg-smart-cloud-fm-prod'
        cluster-name: 'aks-smart-cloud-fm-prod'

    - name: Create K8s Secrets
      run: |
        kubectl create secret generic cloud-secrets \
          --from-literal=storage-connection="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
          --from-literal=mongo-uri="${{ secrets.MONGO_URI }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to AKS
      uses: azure/k8s-deploy@v5
      with:
        manifests: |
          k8s/app-deploy.yaml
        images: |
          acrsmartcloudfmprod.azurecr.io/smartcloud:${{ github.sha }}

